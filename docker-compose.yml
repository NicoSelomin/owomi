# ============================================================
# OWOMI — Orchestration locale (PostgreSQL + Backend + Frontend)
# ============================================================
# Usage :
#   docker-compose up postgres            # base de données seule
#   docker-compose up --build             # toute la stack
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: owomi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: owomi_db
      POSTGRES_USER: owomi_user
      POSTGRES_PASSWORD: owomi_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U owomi_user -d owomi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: owomi-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # En conteneur, la BDD est joignable via le nom de service `postgres`
      DB_URL: jdbc:postgresql://postgres:5432/owomi_db
      DB_USERNAME: owomi_user
      DB_PASSWORD: owomi_dev_password
      SPRING_PROFILES_ACTIVE: dev
      CORS_ALLOWED_ORIGINS: http://localhost:4200
    env_file:
      # Optionnel : surcharge par un .env local s'il existe (sinon valeurs ci-dessus)
      - path: ./backend/.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: owomi-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
